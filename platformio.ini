[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ============================================================
; 核心硬件配置 (16MB Flash + 8MB OPI PSRAM)
; ============================================================
; 1. 强制设定 Flash 为 16MB
board_upload.flash_size = 16MB
; 2. 使用超大分区表 (给代码留 3MB+ 空间)
board_build.partitions = huge_app.csv
; 3. 开启 OPI 8线内存模式 (没有这行，PSRAM 无法使用)
board_build.arduino.memory_type = qio_opi 

; ============================================================
; 编译宏定义
; ============================================================
build_flags = 
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; 开启 USB 直接打印 (解决 Serial.print 不显示的问题)
    -D ARDUINO_USB_CDC_ON_BOOT=1 
    -D ARDUINO_USB_MODE=1

; ============================================================
; 工具链设置
; ============================================================
upload_speed = 921600
monitor_speed = 115200

; ============================================================
; 依赖库 (所有库已手动安装在 lib/ 目录)
; ============================================================
; lib/ESP_Async_WebServer - ESPAsyncWebServer库
; lib/ArduinoJson - ArduinoJson库
; 注意：不使用AsyncTCP，使用简化版WiFi实现